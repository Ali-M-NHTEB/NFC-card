<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ali Mammadov - Digital Business Card</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass: rgba(0,10,25,0.45);
      --glass-border: rgba(255,255,255,0.15);
      --accent: #4fc3f7;
      --accent2: #81c784;
      --text: #f0f4f8;
      --muted: rgba(255,255,255,0.55);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: url('earthrise.jpg') no-repeat center 30% fixed;
      background-size: cover;
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Dark overlay — lighter so earth is visible */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, rgba(0,10,25,0.45) 0%, rgba(0,5,15,0.55) 100%);
      z-index: 0;
    }

    .card-container {
      position: relative;
      z-index: 1;
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      max-width: 400px;
      width: 90%;
      border-radius: 28px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
      overflow: hidden;
      animation: rise 0.75s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(36px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .header {
      position: relative;
      text-align: center;
      padding: 40px 24px 28px;
      background: linear-gradient(180deg, rgba(79,195,247,0.07) 0%, transparent 100%);
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
    }

    .avatar-ring {
      width: 116px; height: 116px;
      margin: 0 auto 15px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 0 5px rgba(79,195,247,0.12), 0 8px 24px rgba(0,0,0,0.4);
      overflow: hidden;
    }

    .avatar-ring img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      object-position: center 10;
      display: block;
      background: #1a2a3a;
    }

    .avatar-fallback {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a3a5c, #0d2137);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 28px; font-weight: 800;
      letter-spacing: -1px;
      color: var(--accent);
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .title {
      font-size: 12px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.3px;
      line-height: 1.5;
      max-width: 250px;
      margin: 0 auto 4px;
    }

    .social-section {
      padding: 20px 28px 28px;
    }

    .social-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .social-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 14px 6px;
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
      position: relative;
      overflow: hidden;
    }

    .social-link::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s;
      border-radius: inherit;
    }

    .social-link:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    .social-link:hover::before { opacity: 1; }
    .social-link i { font-size: 22px; position: relative; z-index: 1; }
    .social-link span {
      font-size: 9px; font-weight: 500;
      letter-spacing: 0.3px; opacity: 0.7;
      position: relative; z-index: 1;
    }

    .sl-linkedin::before  { background: rgba(0,119,181,0.15); }
    .sl-x::before         { background: rgba(231,231,231,0.1); }
    .sl-github::before    { background: rgba(240,246,252,0.1); }
    .sl-instagram::before { background: linear-gradient(135deg, rgba(225,48,108,0.15), rgba(253,140,0,0.12)); }

    .sl-linkedin:hover i  { color: #4fc3f7; }
    .sl-x:hover i         { color: #e7e7e7; }
    .sl-github:hover i    { color: #f0f6fc; }
    .sl-instagram:hover i { color: #e1306c; }

    .footer {
      text-align: center;
      padding: 14px 20px 20px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.3px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    @media (max-width: 480px) {
      body { padding: 12px; }
      .name { font-size: 20px; }
      .title { font-size: 11.5px; }
      .avatar-ring { width: 90px; height: 90px; }
      .social-link { padding: 12px 4px; }
      .social-link i { font-size: 20px; }
      .social-section { padding: 16px 20px 24px; }
      .header { padding: 32px 20px 24px; }
    }
  </style>
</head>
<body>
  <div class="card-container">

    <div class="header">
      <div class="avatar-ring">
        <img src="ali-mammadov-profile.jpg" alt="Ali Mammadov"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="avatar-fallback" style="display:none;">AM</div>
      </div>
      <div class="name">Ali Mammadov</div>
      <div class="title">Climate Activist · Sustainability Manager · Space Enthusiast</div>
    </div>

    <div class="social-section">
      <div class="social-label">Connect</div>
      <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;">

        <a class="social-link sl-linkedin" href="https://www.linkedin.com/in/ali-etbn" target="_blank">
          <i class="fab fa-linkedin-in"></i>
          <span>LinkedIn</span>
        </a>

        <a class="social-link sl-x" href="https://x.com/9562ali" target="_blank">
          <i style="display:flex;align-items:center;justify-content:center;">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.261 5.632 5.903-5.632Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
          </i>
          <span>X</span>
        </a>

        <a class="social-link sl-github" href="https://github.com/Ali-M-NHTEB" target="_blank">
          <i class="fab fa-github"></i>
          <span>GitHub</span>
        </a>

        <a class="social-link sl-instagram" href="https://www.instagram.com/ali.etbn" target="_blank">
          <i class="fab fa-instagram"></i>
          <span>Instagram</span>
        </a>

      </div>
    </div>

    <div class="footer">
      Tap any link · NFC enabled · © 2025 Ali Mammadov
    </div>

  </div>
</body>
</html>
